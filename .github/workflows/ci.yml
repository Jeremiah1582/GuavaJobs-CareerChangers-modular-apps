name: CI

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'web/**'
      - 'package.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'api/**'
      - 'web/**'
      - 'package.json'
      - '.github/workflows/ci.yml'

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://user:pass@localhost:5432/guavajobs_ci
      DIRECT_URL: postgresql://user:pass@localhost:5432/guavajobs_ci
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_JWKS_URL: https://placeholder.supabase.co/auth/v1/.well-known/jwks.json
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  api-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: guavajobs_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d guavajobs_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://user:pass@localhost:5432/guavajobs_ci
      DIRECT_URL: postgresql://user:pass@localhost:5432/guavajobs_ci
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_JWKS_URL: https://placeholder.supabase.co/auth/v1/.well-known/jwks.json
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      REDIS_URL: redis://localhost:6379
      RUN_BULLMQ_WORKERS: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Money-path e2e
        run: npm run test:e2e:money
