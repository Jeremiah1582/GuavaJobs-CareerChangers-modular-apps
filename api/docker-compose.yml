# Local dev only — Redis for job cache / BullMQ (npm run dev:infra).
# Postgres: Supabase (set DATABASE_URL + DIRECT_URL in .env — see .env.example).
# Production (Coolify/Hetzner) does not use this file — see Dockerfile
# and docs/DEPLOY.md. Redis in production is a separate Coolify resource
# (or Upstash), not this compose file.
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
